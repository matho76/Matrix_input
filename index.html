<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Text Input</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #121212; --accent: #00e676; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent); }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 5px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Screen Input</h1>
    
    <label>Message to Display</label>
    <input type="text" id="textInput" placeholder="Type message here..." maxlength="100">

    <div class="controls">
        <div>
            <label>Text Color</label>
            <input type="color" id="textColor" value="#00e676" style="width:100%; height:40px; border:none; background:none;">
        </div>
        <div>
            <label>Scroll Speed</label>
            <input type="range" id="speed" min="50" max="255" value="180" style="width:100%;">
        </div>
    </div>

    <button onclick="publishMessage()">UPDATE MATRIX</button>
</div>

<script>
    // Connect to HiveMQ public broker
    const client = mqtt.connect('ws://broker.hivemq.com:8000/mqtt');
    const topic = "wled/Text_screen_input/api";

    client.on('connect', () => { console.log("Connected to HiveMQ"); });

    function publishMessage() {
        const text = document.getElementById('textInput').value || "No Message";
        const colorHex = document.getElementById('textColor').value;
        const speed = document.getElementById('speed').value;

        // Convert hex to RGB array
        const r = parseInt(colorHex.slice(1, 3), 16);
        const g = parseInt(colorHex.slice(3, 5), 16);
        const b = parseInt(colorHex.slice(5, 7), 16);

        const payload = {
            "on": true,
            "bri": 200,
            "seg": [{
                "id": 0,
                "fx": 122,      // Scrolling Text Effect
                "n": text,      // The string to scroll
                "sx": parseInt(speed),
                "ix": 128,      // Standard vertical alignment/size
                "col": [[r, g, b], [0, 0, 0], [0, 0, 0]]
            }]
        };

        client.publish(topic, JSON.stringify(payload), { qos: 0, retain: true });
        
        // Visual feedback
        const btn = document.querySelector('button');
        btn.innerText = "SENT!";
        btn.style.background = "#fff";
        setTimeout(() => { 
            btn.innerText = "UPDATE MATRIX"; 
            btn.style.background = "#00e676";
        }, 2000);
    }
</script>

</body>
</html>
