<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Text Input</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #121212; --accent: #00e676; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent); }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 5px; text-align: left; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Screen Input</h1>
    
    <label>Message to Display</label>
    <input type="text" id="textInput" placeholder="Type message here..." maxlength="100">

    <div class="controls">
        <div>
            <label>Text Color</label>
            <input type="color" id="textColor" value="#00e676" style="width:100%; height:40px; border:none; background:none;">
        </div>
        <div>
            <label>Scroll Speed</label>
            <input type="range" id="speed" min="50" max="255" value="180" style="width:100%;">
        </div>
    </div>

    <button id="sendBtn" onclick="publishMessage()" disabled>CONNECTING...</button>
    <p id="status" style="font-size: 0.7rem; margin-top: 10px; color: #666;">Initializing connection...</p>
</div>

<script>
    // FIXED: Generate a unique ID so the broker doesn't block the connection
    const clientId = 'wled_user_' + Math.random().toString(16).substr(2, 8);
    const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt';
    const topic = "wled/Text_screen_input/api";
    
    const btn = document.getElementById('sendBtn');
    const statusTxt = document.getElementById('status');

    // MQTT Options for better stability on mobile
    const options = {
        keepalive: 60,
        clientId: clientId,
        protocolId: 'MQTT',
        protocolVersion: 4,
        clean: true,
        reconnectPeriod: 1000,
        connectTimeout: 30 * 1000,
    };

    console.log("Attempting to connect with ID:", clientId);
    const client = mqtt.connect(brokerUrl, options);

    client.on('connect', () => { 
        console.log("Connected to HiveMQ Securely!");
        btn.innerText = "UPDATE MATRIX";
        btn.disabled = false;
        statusTxt.innerText = "Connected: " + clientId;
        statusTxt.style.color = "#00e676";
    });

    client.on('reconnect', () => {
        statusTxt.innerText = "Reconnecting...";
        statusTxt.style.color = "orange";
    });

    client.on('error', (err) => {
        console.error("Connection error: ", err);
        statusTxt.innerText = "Connection Error";
        statusTxt.style.color = "red";
    });
