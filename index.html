<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Messenger</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #121212; --accent: #00e676; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent); }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #888; }
        #status { font-size: 0.8rem; margin-top: 15px; color: #888; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Matrix Messenger</h1>
    <input type="text" id="textInput" placeholder="Enter message..." maxlength="100">
    <button id="sendBtn" onclick="publishMessage()" disabled>CONNECTING...</button>
    <p id="status">System: Initializing...</p>
</div>

<script>
    // --- STEP 1: ENTER YOUR DETAILS HERE ---
    const AIO_USERNAME = "Matho76"; 
    const AIO_KEY = "aio_lJoU82LXKqFSXx4nxSmcYJPFgmzG";
    const AIO_FEED = "matrix-text"; 
    // ---------------------------------------

    const btn = document.getElementById('sendBtn');
    const statusTxt = document.getElementById('status');

    // Robust connection options
    const options = {
        host: 'io.adafruit.com',
        port: 443,
        protocol: 'wss',
        username: AIO_USERNAME,
        password: AIO_KEY,
        clientId: 'web_' + Math.random().toString(16).substr(2, 8),
        path: '/mqtt'
    };

    statusTxt.innerText = "System: Attempting Secure Handshake...";
    const client = mqtt.connect(options);

    client.on('connect', () => { 
        btn.innerText = "UPDATE MATRIX";
        btn.disabled = false;
        statusTxt.innerText = "System: Cloud Ready (Connected as " + AIO_USERNAME + ")";
        statusTxt.style.color = "#00e676";
    });

    client.on('reconnect', () => {
        statusTxt.innerText = "System: Retrying connection...";
        statusTxt.style.color = "orange";
    });

    client.on('error', (err) => {
        statusTxt.innerText = "Error: Authentication Failed. Check Username/Key.";
        statusTxt.style.color = "red";
        console.error(err);
    });

    function publishMessage() {
        const text = document.getElementById('textInput').value || "Hello";
        const topic = AIO_USERNAME + "/feeds/" + AIO_FEED;
        
        const payload = {
            "on": true,
            "seg": [{
                "id": 0,
                "fx": 122, 
                "n": text,
                "sx": 180,
                "col": [[0, 230, 118], [0, 0, 0], [0, 0, 0]]
            }]
        };

        if (client.connected) {
            client.publish(topic, JSON.stringify(payload));
            btn.innerText = "SENT!";
            setTimeout(() => { btn.innerText = "UPDATE MATRIX"; }, 2000);
        }
    }
</script>
</body>
</html>
