<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Messenger</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #121212; --accent: #00e676; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: var(--card); padding: 2rem; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent); }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #444; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; color: #888; }
        #status { font-size: 0.8rem; margin-top: 15px; color: #888; padding: 10px; background: #000; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Matrix Messenger</h1>
    <input type="text" id="textInput" placeholder="Enter message..." maxlength="100">
    <button id="sendBtn" onclick="publishMessage()" disabled>CONNECTING...</button>
    <div id="status">Checking Credentials...</div>
</div>

<script>
    // Credentials updated based on your screenshot
    const AIO_USERNAME = "Matho76"; 
    const AIO_KEY = "aio_VtIj246df2P9TdWLbv5pgPi1VWMC";
    const AIO_FEED = "matrix-text"; 

    const btn = document.getElementById('sendBtn');
    const statusTxt = document.getElementById('status');

    const options = {
        username: AIO_USERNAME,
        password: AIO_KEY,
        clientId: 'web_' + Math.random().toString(16).substr(2, 8),
        clean: true,
        connectTimeout: 5000,
        reconnectPeriod: 2000,
    };

    // Connecting via Secure WebSockets
    const client = mqtt.connect('wss://io.adafruit.com:443/mqtt', options);

    client.on('connect', () => { 
        btn.innerText = "UPDATE MATRIX";
        btn.disabled = false;
        statusTxt.innerText = "SUCCESS: Cloud Connected as Matho76";
        statusTxt.style.color = "#00e676";
    });

    client.on('reconnect', () => {
        statusTxt.innerText = "Retrying Connection...";
        statusTxt.style.color = "orange";
    });

    client.on('error', (err) => {
        statusTxt.innerText = "Error: Authentication Failed.";
        statusTxt.style.color = "#ff5252";
    });

    function publishMessage() {
        const text = document.getElementById('textInput').value || "Hello";
        const topic = AIO_USERNAME + "/feeds/" + AIO_FEED;
        
        const payload = {
            "on": true,
            "bri": 200,
            "seg": [{
                "id": 0,
                "fx": 122, 
                "n": text,
                "sx": 180,
                "col": [[0, 230, 118], [0, 0, 0], [0, 0, 0]]
            }]
        };

        if (client.connected) {
            client.publish(topic, JSON.stringify(payload));
            btn.innerText = "SENT!";
            btn.style.background = "#fff";
            setTimeout(() => { 
                btn.innerText = "UPDATE MATRIX"; 
                btn.style.background = "#00e676";
            }, 2000);
        }
    }
</script>
</body>
</html>
